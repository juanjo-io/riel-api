<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riél — Lender Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f7f6f2;
      --surface:    #ffffff;
      --border:     rgba(40,37,29,0.10);
      --shadow:     0 1px 3px rgba(26,25,22,0.07);
      --text:       #1a1916;
      --muted:      #6b6760;
      --faint:      #a9a8a3;
      --accent:     #01696f;
      --accent-h:   #0c4e54;
      --accent-bg:  #e0eeee;
      --green:      #2d7a3a;
      --green-bg:   #eaf5ec;
      --yellow:     #9a5a00;
      --yellow-bg:  #fef3e2;
      --red:        #b92b2b;
      --red-bg:     #fdeaea;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 15px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo-group { display: flex; flex-direction: column; gap: 4px; }
    .logo-name  {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--text);
    }
    .logo-line  {
      height: 2px;
      background: linear-gradient(to right, var(--accent), #06B6D4, var(--accent));
      border-radius: 2px;
    }
    .header-sub {
      font-size: 0.72rem;
      color: var(--faint);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 8px 14px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    /* ── Page layout ─────────────────────────────────────────── */
    main { padding: 32px 40px 64px; max-width: 1200px; margin: 0 auto; }

    /* ── KPI strip ───────────────────────────────────────────── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 20px 24px;
    }

    .kpi-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .kpi-value.green  { color: var(--green); }
    .kpi-value.yellow { color: var(--yellow); }
    .kpi-value.red    { color: var(--red); }
    .kpi-value.accent { color: var(--accent); }

    .kpi-sub {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .kpi-pill {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
    }
    .kpi-pill.green  { background: var(--green-bg);  color: var(--green); }
    .kpi-pill.yellow { background: var(--yellow-bg); color: var(--yellow); }
    .kpi-pill.red    { background: var(--red-bg);    color: var(--red); }
    .kpi-pill.accent { background: var(--accent-bg); color: var(--accent); }

    /* ── Charts grid ─────────────────────────────────────────── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .chart-full { grid-column: 1 / -1; }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 24px 28px;
    }

    .chart-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 20px;
    }

    .chart-wrap { position: relative; }
    .chart-wrap.tall  { height: 260px; }
    .chart-wrap.short { height: 220px; }

    /* ── Loading / error state ───────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--muted);
      font-size: 0.85rem;
      gap: 10px;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { color: var(--red); font-size: 0.82rem; }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 800px) {
      header { padding: 20px; }
      main   { padding: 20px 16px 48px; }
      .kpi-row { grid-template-columns: 1fr 1fr; }
      .charts-grid { grid-template-columns: 1fr; }
      .chart-full { grid-column: auto; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-group">
    <div class="logo-name">Riél</div>
    <div class="logo-line"></div>
    <div class="header-sub">Lender Dashboard · Portfolio Intelligence</div>
  </div>
  <div class="header-right">
    <div class="status-dot" id="status-dot" title="Live"></div>
    <button class="refresh-btn" onclick="loadStats()">Refresh</button>
  </div>
</header>

<main>
  <!-- KPI strip -->
  <div class="kpi-row" id="kpi-row">
    <div class="loading" style="grid-column:1/-1">
      <div class="spinner"></div> Loading dashboard…
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-grid" id="charts-grid" style="display:none;">

    <!-- Score distribution -->
    <div class="chart-card">
      <div class="chart-title">Score Distribution</div>
      <div class="chart-wrap tall">
        <canvas id="chart-dist"></canvas>
      </div>
    </div>

    <!-- Average credit limit by bank -->
    <div class="chart-card">
      <div class="chart-title">Avg Credit Limit by Bank</div>
      <div class="chart-wrap tall">
        <canvas id="chart-bank"></canvas>
      </div>
    </div>

    <!-- Approval rate over time (full width) -->
    <div class="chart-card chart-full">
      <div class="chart-title">Approval Rate — Last 8 Weeks (%)</div>
      <div class="chart-wrap short">
        <canvas id="chart-weekly"></canvas>
      </div>
    </div>

  </div>
</main>

<script>
  const API_KEY  = "riel_sk_demo_28cf009ae77c8667587968f5";
  const API_BASE = "";   // same origin

  const CHART_DEFAULTS = {
    color: "#6b6760",
    borderColor: "rgba(40,37,29,0.06)",
    font: { family: "Inter, sans-serif", size: 12 },
  };

  Chart.defaults.color          = CHART_DEFAULTS.color;
  Chart.defaults.borderColor    = CHART_DEFAULTS.borderColor;
  Chart.defaults.font.family    = "Inter, sans-serif";
  Chart.defaults.font.size      = 12;

  let distChart, weeklyChart, bankChart;

  async function loadStats() {
    document.getElementById("status-dot").style.background = "#facc15";

    try {
      const res = await fetch(`${API_BASE}/dashboard/stats`, {
        headers: { "X-API-Key": API_KEY },
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderKPIs(data);
      renderCharts(data);
      document.getElementById("status-dot").style.background = "#4ade80";
    } catch (e) {
      document.getElementById("kpi-row").innerHTML =
        `<div class="error-msg" style="grid-column:1/-1">Failed to load stats: ${e.message}</div>`;
      document.getElementById("status-dot").style.background = "#f87171";
    }
  }

  function renderKPIs(data) {
    const approvalRate  = data.overall_approval_rate ?? 0;
    const totalMerchants = data.total_merchants_scored ?? 0;
    const dist = data.score_distribution ?? {};
    const approved = dist["61-80"] + dist["81-100"];
    const reviewed = dist["41-60"];
    const declined = dist["0-20"] + dist["21-40"];

    const kpiEl = document.getElementById("kpi-row");
    kpiEl.innerHTML = `
      <div class="kpi-card">
        <div class="kpi-label">Merchants Scored</div>
        <div class="kpi-value accent">${totalMerchants}</div>
        <div class="kpi-sub"><span class="kpi-pill accent">all time</span></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Approval Rate</div>
        <div class="kpi-value ${approvalRate >= 60 ? 'green' : approvalRate >= 40 ? 'yellow' : 'red'}">${approvalRate}%</div>
        <div class="kpi-sub"><span class="kpi-pill ${approvalRate >= 60 ? 'green' : approvalRate >= 40 ? 'yellow' : 'red'}">${approved} approved</span></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Under Review</div>
        <div class="kpi-value yellow">${reviewed}</div>
        <div class="kpi-sub"><span class="kpi-pill yellow">manual check</span></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Declined</div>
        <div class="kpi-value red">${declined}</div>
        <div class="kpi-sub"><span class="kpi-pill red">below threshold</span></div>
      </div>
    `;
  }

  function renderCharts(data) {
    document.getElementById("charts-grid").style.display = "";

    const gridColor  = "rgba(40,37,29,0.06)";
    const tickColor  = "#a9a8a3";

    // ── 1. Score Distribution ──────────────────────────────────
    const distLabels = Object.keys(data.score_distribution);
    const distValues = Object.values(data.score_distribution);
    const distColors = ["#b92b2b", "#e07b00", "#9a5a00", "#2d7a3a", "#01696f"];

    if (distChart) distChart.destroy();
    distChart = new Chart(document.getElementById("chart-dist"), {
      type: "bar",
      data: {
        labels: distLabels,
        datasets: [{
          label: "Merchants",
          data: distValues,
          backgroundColor: distColors,
          borderRadius: 6,
          borderSkipped: false,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.parsed.y} merchant${ctx.parsed.y !== 1 ? "s" : ""}`,
            },
          },
        },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: tickColor } },
          y: {
            grid: { color: gridColor },
            ticks: { color: tickColor, stepSize: 1, precision: 0 },
            beginAtZero: true,
          },
        },
      },
    });

    // ── 2. Approval Rate Weekly ────────────────────────────────
    const wLabels = data.approval_rate_weekly.labels;
    const wData   = data.approval_rate_weekly.data;

    if (weeklyChart) weeklyChart.destroy();
    weeklyChart = new Chart(document.getElementById("chart-weekly"), {
      type: "line",
      data: {
        labels: wLabels,
        datasets: [{
          label: "Approval Rate %",
          data: wData,
          borderColor: "#01696f",
          backgroundColor: "rgba(1,105,111,0.10)",
          fill: true,
          tension: 0.35,
          pointBackgroundColor: "#01696f",
          pointRadius: 4,
          pointHoverRadius: 6,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: { label: ctx => ` ${ctx.parsed.y}%` },
          },
        },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: tickColor } },
          y: {
            grid: { color: gridColor },
            ticks: { color: tickColor, callback: v => v + "%" },
            min: 0, max: 100,
          },
        },
      },
    });

    // ── 3. Avg Credit Limit by Bank (horizontal) ──────────────
    const bankLabels = Object.keys(data.avg_limit_by_bank);
    const bankValues = Object.values(data.avg_limit_by_bank);
    const bankColors = bankValues.map(v =>
      v >= 300000 ? "#01696f" : v >= 150000 ? "#9a5a00" : "#b92b2b"
    );

    if (bankChart) bankChart.destroy();
    bankChart = new Chart(document.getElementById("chart-bank"), {
      type: "bar",
      data: {
        labels: bankLabels,
        datasets: [{
          label: "Avg Limit (COP)",
          data: bankValues,
          backgroundColor: bankColors,
          borderRadius: 6,
          borderSkipped: false,
        }],
      },
      options: {
        indexAxis: "y",
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` COP ${ctx.parsed.x.toLocaleString("es-CO")}`,
            },
          },
        },
        scales: {
          x: {
            grid: { color: gridColor },
            ticks: {
              color: tickColor,
              callback: v => "COP " + (v / 1000).toFixed(0) + "k",
            },
            beginAtZero: true,
          },
          y: { grid: { display: false }, ticks: { color: tickColor } },
        },
      },
    });
  }

  loadStats();
</script>
</body>
</html>
