<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riél — Connect your bank</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 { font-size: 1.6rem; color: #1a1a1a; margin-bottom: 8px; }
    p  { font-size: 0.95rem; color: #666; margin-bottom: 32px; line-height: 1.5; }
    button {
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px 32px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover  { background: #333; }
    button:disabled { background: #999; cursor: not-allowed; }
    #status {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #888;
      min-height: 20px;
    }
    #status.error   { color: #c0392b; }
    #status.success { color: #27ae60; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Riél</h1>
    <p>Connect your bank account securely to receive a personalised credit score.</p>
    <button id="connectBtn" onclick="startWidget()">Connect my bank</button>
    <div id="status"></div>
  </div>

  <script src="https://cdn.belvo.io/belvo-widget-1-stable.js"></script>
  <script>
    const API_BASE = window.location.origin;

    async function startWidget() {
      const btn    = document.getElementById("connectBtn");
      const status = document.getElementById("status");

      btn.disabled  = true;
      status.className = "";
      status.textContent = "Requesting session token…";

      let token;
      try {
        const res = await fetch(`${API_BASE}/create-widget-session`, { method: "POST" });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(JSON.stringify(err.detail ?? err));
        }
        const data = await res.json();
        token = data.access;
      } catch (e) {
        status.className   = "error";
        status.textContent = "Failed to get token: " + e.message;
        btn.disabled = false;
        return;
      }

      status.textContent = "Opening Belvo widget…";

      belvoSDK.createWidget(token, {
        callback: (link, institution) => {
          status.className   = "success";
          status.textContent = `✓ Bank connected! Link ID: ${link}`;
          btn.disabled = false;
          console.log("Belvo link created:", link, institution);
        },
        onExit: (data) => {
          status.className   = "";
          status.textContent = "Widget closed.";
          btn.disabled = false;
          console.log("Widget exit:", data);
        },
        onEvent: (data) => {
          console.log("Widget event:", data);
        },
      }).build();
    }
  </script>
</body>
</html>
